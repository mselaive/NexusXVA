spring:
  application:
    name: nexusxva-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nexusxva}
    username: ${SPRING_DATASOURCE_USERNAME:nexusxva}
    password: ${SPRING_DATASOURCE_PASSWORD:nexusxva}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

nexusxva:
  eod:
    enabled: ${NEXUSXVA_EOD_ENABLED:false}
    cron: ${NEXUSXVA_EOD_CRON:0 15 17 * * MON-FRI}
    zone: ${NEXUSXVA_EOD_ZONE:America/New_York}
    allow-stale: ${NEXUSXVA_EOD_ALLOW_STALE:false}
  auth:
    enabled: ${NEXUSXVA_AUTH_ENABLED:false}
    session-hours: ${NEXUSXVA_AUTH_SESSION_HOURS:8}
    cookie-name: ${NEXUSXVA_AUTH_COOKIE_NAME:NEXUSXVA_SESSION}
    bootstrap-admin:
      username: ${NEXUSXVA_BOOTSTRAP_ADMIN_USERNAME:admin}
      password: ${NEXUSXVA_BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${NEXUSXVA_BOOTSTRAP_ADMIN_DISPLAY_NAME:NexusXVA Admin}
  market-data:
    provider: ${NEXUSXVA_MARKET_DATA_PROVIDER:blemberg}
    validation:
      enabled: ${NEXUSXVA_MARKET_DATA_VALIDATION_ENABLED:false}
    blemberg:
      base-url: ${BLEMBERG_BASE_URL:http://localhost:8081}
      timeout: ${BLEMBERG_TIMEOUT:2s}

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/nexusxva
    username: nexusxva
    password: nexusxva
