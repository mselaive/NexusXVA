services:
  postgres:
    image: postgres:16-alpine
    container_name: nexusxva-postgres
    environment:
      POSTGRES_DB: nexusxva
      POSTGRES_USER: nexusxva
      POSTGRES_PASSWORD: nexusxva
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: nexusxva-backend
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: docker
      NEXUSXVA_MARKET_DATA_PROVIDER: ${NEXUSXVA_MARKET_DATA_PROVIDER:-blemberg}
      NEXUSXVA_MARKET_DATA_VALIDATION_ENABLED: ${NEXUSXVA_MARKET_DATA_VALIDATION_ENABLED:-false}
      BLEMBERG_BASE_URL: ${BLEMBERG_BASE_URL:-http://host.docker.internal:8081}
      BLEMBERG_TIMEOUT: ${BLEMBERG_TIMEOUT:-2s}
    ports:
      - "8080:8080"

volumes:
  postgres-data:
